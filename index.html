<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e8eaf6 50%, #e3f2fd 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #5d4037;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header p {
            font-size: 1.1rem;
            color: #6d4c41;
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9800, #e91e63);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* 问题卡片 */
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #ff9800, #e91e63);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* 选项按钮 */
        .options {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            width: 100%;
            padding: 18px 25px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            font-size: 1.1rem;
            color: #555;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover {
            border-color: #ff9800;
            background: #fff8e1;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,152,0,0.2);
        }

        .option-btn.selected {
            border-color: #e91e63;
            background: #fce4ec;
            color: #e91e63;
        }

        /* 结果页面 */
        .result-container {
            text-align: center;
            padding: 40px 20px;
        }

        .flower-icon {
            font-size: 8rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .flower-name {
            font-size: 2.5rem;
            color: #5d4037;
            margin-bottom: 15px;
        }

        .flower-title {
            font-size: 1.3rem;
            color: #ff9800;
            margin-bottom: 30px;
        }

        .flower-description {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: left;
            line-height: 1.8;
            color: #555;
            box-shadow: 0 5px 25px rgba(0,0,0,0.08);
        }

        .flower-traits {
            margin-top: 25px;
        }

        .flower-traits h4 {
            color: #e91e63;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .trait-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .trait-tag {
            background: linear-gradient(135deg, #ffc107, #ff9800);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 0.95rem;
        }

        /* 重新测试按钮 */
        .restart-btn {
            margin-top: 35px;
            padding: 15px 50px;
            background: linear-gradient(135deg, #e91e63, #ff9800);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(233,30,99,0.3);
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(233,30,99,0.4);
        }

        /* 隐藏元素 */
        .hidden {
            display: none;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 50px;
        }

        .loading p {
            font-size: 1.2rem;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff9800;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        let currentQuestion = 0;
        let answers = [];

        // 开始测试
        function startTest() {
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('test-page').classList.remove('hidden');
            showQuestion();
        }

        // 显示问题
        function showQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-number').textContent = currentQuestion + 1;
            document.getElementById('question-text').textContent = question.question;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = option.text;
                button.onclick = () => selectOption(option.type);
                optionsContainer.appendChild(button);
            });
            
            updateProgress();
        }

        // 选择选项
        function selectOption(type) {
            answers.push(type);
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        // 更新进度条
        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        // 显示结果
        function showResult() {
            document.getElementById('test-page').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-page').classList.remove('hidden');
                
                const flower = calculateResult();
                displayFlower(flower);
            }, 1500);
        }

        // 计算结果
        function calculateResult() {
            const typeMapping = {
                extrovert: [0, 1],
                introvert: [2, 3],
                nature: [4, 7],
                adventure: [5, 0],
                gentle: [3, 4],
                energetic: [1, 0],
                elegant: [2, 5],
                mysterious: [3, 7],
                independent: [6, 2],
                supportive: [0, 1],
                optimistic: [1, 4],
                analytical: [2, 5],
                fresh: [4, 1],
                warm: [0, 1],
                serene: [3, 7],
                pure: [7, 6],
                sincere: [0, 3],
                brave: [6, 0],
                wise: [2, 5],
                free: [4, 6]
            };
            
            let scores = new Array(flowerTypes.length).fill(0);
            
            answers.forEach(type => {
                if (typeMapping[type]) {
                    typeMapping[type].forEach(index => {
                        scores[index]++;
                    });
                }
            });
            
            const maxScore = Math.max(...scores);
            const topFlowers = scores
                .map((score, index) => ({ score, index }))
                .filter(item => item.score === maxScore);
            
            const randomIndex = Math.floor(Math.random() * topFlowers.length);
            return flowerTypes[topFlowers[randomIndex].index];
        }

        // 显示花类型结果
        function displayFlower(flower) {
            document.getElementById('flower-icon').textContent = flower.icon;
            document.getElementById('flower-name').textContent = flower.name;
            document.getElementById('flower-title').textContent = flower.title;
            document.getElementById('flower-description').textContent = flower.description;
            
            const traitTags = document.getElementById('trait-tags');
            traitTags.innerHTML = '';
            
            flower.traits.forEach(trait => {
                const tag = document.createElement('span');
                tag.className = 'trait-tag';
                tag.textContent = trait;
                traitTags.appendChild(tag);
            });
        }

        // 重新测试
        function restartTest() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('start-page').classList.remove('hidden');
            document.getElementById('progress-fill').style.width = '0%';
        }
