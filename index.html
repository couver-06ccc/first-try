<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 花之性格测试 - Flower Personality Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #fce4ec 0%, #e8eaf6 50%, #e3f2fd 100%); min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 40px 20px; }
        .header h1 { font-size: 2.5rem; color: #5d4037; margin-bottom: 10px; }
        .header p { font-size: 1.1rem; color: #6d4c41; }
        .counter-badge { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 8px 20px; border-radius: 25px; font-size: 1rem; margin-top: 15px; }
        
        /* 进度条样式 - 显示题目数 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9800, #e91e63);
            border-radius: 4px;
            transition: width 0.3s ease;
            position: relative;
        }
        .progress-fill::after {
            content: attr(data-progress);
            position: absolute;
            right: 10px;
            top: -25px;
            font-size: 14px;
            color: #666;
            font-weight: 500;
            white-space: nowrap;
        }

        .question-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .question-number { display: inline-block; background: linear-gradient(135deg, #ff9800, #e91e63); color: white; width: 36px; height: 36px; border-radius: 50%; text-align: center; line-height: 36px; font-weight: bold; margin-bottom: 15px; }
        .question-text { font-size: 1.2rem; color: #333; margin-bottom: 25px; line-height: 1.6; }
        .options { display: grid; gap: 15px; }
        .option-btn { width: 100%; padding: 18px 25px; border: 2px solid #e0e0e0; border-radius: 12px; background: white; font-size: 1.1rem; color: #555; cursor: pointer; transition: all 0.3s ease; text-align: left; }
        .option-btn:hover { border-color: #ff9800; background: #fff8e1; transform: translateY(-2px); }
        .option-btn.selected { border-color: #e91e63; background: #fce4ec; color: #e91e63; }
        
        .navigation-buttons { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .nav-btn { padding: 12px 28px; border: none; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: all 0.3s ease; }
        .nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #prev-btn { background: #f5f5f5; color: #666; }
        #prev-btn:hover:not(:disabled) { background: #e8e8e8; }
        .cancel-btn:hover { background: #ee5253; } 
        .question-progress { font-size: 1rem; color: #888; }

        .result-container { text-align: center; padding: 40px 20px; }
        .flower-icon { font-size: 8rem; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .flower-name { font-size: 2.5rem; color: #5d4037; margin-bottom: 15px; }
        .flower-title { font-size: 1.3rem; color: #ff9800; margin-bottom: 30px; }
        .flower-description { background: white; border-radius: 15px; padding: 25px; text-align: left; line-height: 1.8; color: #555; }
        .flower-traits { margin-top: 25px; }
        .flower-traits h4 { color: #e91e63; margin-bottom: 15px; font-size: 1.2rem; }
        .trait-tags { display: flex; flex-wrap: wrap; gap: 12px; }
        .trait-tag { background: linear-gradient(135deg, #ffc107, #ff9800); color: white; padding: 10px 24px; border-radius: 25px; font-size: 1rem; }
        
        .restart-btn { margin-top: 35px; padding: 15px 50px; background: linear-gradient(135deg, #e91e63, #ff9800); color: white; border: none; border-radius: 30px; font-size: 1.1rem; cursor: pointer; transition: all 0.3s ease; }
        .hidden { display: none; }
        .loading { text-align: center; padding: 50px; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #ff9800; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-page" class="header">

            <p>探索你内心深处的花语，发现属于你的花之灵魂</p>
            <span class="counter-badge" id="test-counter">🌸 已有 0 人参与测试</span>
            <button class="restart-btn" style="margin-top: 30px;" onclick="startTest()">开始测试</button>
        </div>

        <div id="test-page" class="hidden">
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <div class="question-card">
                <span class="question-number" id="question-number">1</span>
                <p class="question-text" id="question-text">问题加载中...</p>
                <div class="options" id="options"></div>
                <div class="navigation-buttons">
                    <button class="nav-btn" id="prev-btn" onclick="prevQuestion()" disabled>← 上一题</button>
                    <button class="nav-btn cancel-btn" id="cancel-btn" onclick="cancelTest()">取消测试</button>
                    <span class="question-progress" id="question-progress">1 / 50</span>
                </div>
            </div>
        </div>

        <div id="loading" class="hidden">

        </div>

        <div id="result-page" class="hidden result-container">

            <h2 class="flower-name" id="flower-name">结果加载中...</h2>
            <p class="flower-title" id="flower-title">---</p>
            <div class="flower-description">

                <div class="flower-traits">

                    <div class="trait-tags" id="trait-tags"></div>

            <button class="restart-btn" onclick="restartTest()">重新测试</button>
        </div>

                { text: "壮丽的山脉", type: "brave" },
                { text: "宁静的湖泊", type: "serene" },
                { text: "广袤的草原", type: "nature" },
                { text: "神秘的森林", type: "mysterious" }
            ]},
            { question: "你对金钱的使用原则是？", options: [
                { text: "该花则花，该省则省", type: "analytical" },
                { text: "享受当下，及时行乐", type: "free" },
                { text: "优先保障生活品质", type: "elegant" },
                { text: "注重投资和未来", type: "wise" }
            ]},
            { question: "你最喜欢的节日是？", options: [
                { text: "春节", type: "supportive" },
                { text: "情人节", type: "warm" },
                { text: "中秋节", type: "serene" },
                { text: "万圣节", type: "mysterious" }
            ]},
            { question: "你对自我提升的态度是？", options: [
                { text: "不断学习，追求进步", type: "brave" },
                { text: "循序渐进，稳步提升", type: "analytical" },
                { text: "保持现状，接受自己", type: "serene" },
                { text: "跟随兴趣，自由探索", type: "free" }
            ]}
        ];

        const flowerTypes = [
            { name: "玫瑰", icon: "🌹", title: "热情恋人", description: "你像一朵盛开的玫瑰，热情而浪漫。你热爱生活，敢于表达自己的情感，对爱情充满向往。你的魅力如同玫瑰般迷人，让人无法抗拒。你珍惜身边的人，愿意为爱的人付出一切。", traits: ["热情", "浪漫", "勇敢", "忠诚", "魅力", "直率"] },
            { name: "向日葵", icon: "🌻", title: "阳光使者", description: "你像一朵向日葵，永远面向阳光。你性格开朗，积极乐观，总是能给身边的人带来正能量。无论遇到什么困难，你都能保持微笑，相信一切都会好起来。你的存在就是别人的小太阳。", traits: ["乐观", "开朗", "积极", "温暖", "正能量", "豁达"] },
            { name: "兰花", icon: "🌺", title: "优雅君子", description: "你像一朵兰花，高贵而优雅。你内心丰富，品味高雅，注重精神世界的追求。你不喜欢张扬，却自有一股独特的气质。你待人谦和，做事稳重，是值得信赖的朋友。", traits: ["优雅", "高贵", "内敛", "智慧", "高雅", "沉稳"] },
            { name: "薰衣草", icon: "💜", title: "宁静之心", description: "你像一片薰衣草田，宁静而治愈。你性格温和，善于倾听，是朋友们倾诉的对象。你懂得享受独处的时光，内心平静而强大。你的存在能让周围的人感到安心和放松。", traits: ["宁静", "治愈", "温柔", "平和", "包容", "善解人意"] },
            { name: "樱花", icon: "🌸", title: "梦幻精灵", description: "你像一朵樱花，美丽而短暂。你拥有浪漫的灵魂，喜欢生活中的小美好。你温柔善良，敏感细腻，能感受到别人不易察觉的情感。你的存在让世界变得更加美好。", traits: ["浪漫", "温柔", "细腻", "美好", "灵动", "纯真"] },
            { name: "郁金香", icon: "🌷", title: "优雅贵族", description: "你像一朵郁金香，典雅而高贵。你注重礼仪，举止得体，有着良好的教养。你追求完美，对自己要求严格，但也懂得享受生活。你是人群中的亮点，自带光芒。", traits: ["典雅", "高贵", "精致", "自律", "优雅", "自信"] },
            { name: "梅花", icon: "🌼", title: "坚韧勇士", description: "你像一朵梅花，傲雪凌霜。你意志坚强，不畏艰难，在逆境中依然能绽放美丽。你有自己的原则和信念，不会轻易动摇。你的坚韧和毅力让人敬佩。", traits: ["坚韧", "勇敢", "不屈", "高洁", "顽强", "执着"] },
            { name: "荷花", icon: "🪷", title: "清莲雅士", description: "你像一朵荷花，出淤泥而不染。你内心纯净，追求真善美，不随波逐流。你有自己的精神追求，注重内心的修养。你的高洁品格让人敬仰。", traits: ["纯洁", "高雅", "正直", "脱俗", "清逸", "淡泊"] }
        ];

        let currentQuestion = 0, answers = [];

        function loadCounter() {
            const count = localStorage.getItem('flowerTestCount') || 0;
            document.getElementById('test-counter').textContent = `🌸 已有 ${parseInt(count).toLocaleString()} 人参与测试`;
        }

        function incrementCounter() {
            const count = parseInt(localStorage.getItem('flowerTestCount') || 0) + 1;
            localStorage.setItem('flowerTestCount', count.toString());
            loadCounter();
        }

        function startTest() {
            incrementCounter();
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('test-page').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-number').textContent = currentQuestion + 1;
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('question-progress').textContent = `${currentQuestion + 1} / ${questions.length}`;
            document.getElementById('options').innerHTML = '';
            
            q.options.forEach(o => {
                const btn = document.createElement('button');
                btn.className = 'option-btn' + (answers[currentQuestion] === o.type ? ' selected' : '');
                btn.textContent = o.text;
                btn.onclick = () => selectOption(o.type);
                document.getElementById('options').appendChild(btn);
            });

            document.getElementById('prev-btn').disabled = currentQuestion === 0;
            
            // 更新进度条并显示题目数
            const progress = ((currentQuestion + 1) / questions.length * 100);
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-fill').setAttribute('data-progress', `${currentQuestion + 1}/${questions.length}`);
        }

        function selectOption(type) {
            answers[currentQuestion] = type;
            currentQuestion++;
            currentQuestion < questions.length ? showQuestion() : showResult();
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

         function cancelTest() {  // 新增函数
            if (confirm("确定要取消测试吗？当前进度将不会保存。")) {
                 currentQuestion = 0;
                 answers = [];
                 document.getElementById('test-page').classList.add('hidden');
                 document.getElementById('start-page').classList.remove('hidden');
                 document.getElementById('progress-fill').style.width = '0%';
            }
        }

        function showResult() {
            document.getElementById('test-page').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-page').classList.remove('hidden');
                displayFlower(calculateResult());
            }, 1500);
        }

        function calculateResult() {
            const map = { extrovert:[0,1], introvert:[2,3], nature:[4,7], adventure:[5,0], gentle:[3,4], energetic:[1,0], elegant:[2,5], mysterious:[3,7], independent:[6,2], supportive:[0,1], optimistic:[1,4], analytical:[2,5], fresh:[4,1], warm:[0,1], serene:[3,7], pure:[7,6], sincere:[0,3], brave:[6,0], wise:[2,5], free:[4,6] };
            const scores = new Array(flowerTypes.length).fill(0);
            answers.forEach(t => { if(map[t]) map[t].forEach(i => scores[i]++); });
            const max = Math.max(...scores);
            const top = scores.map((s,i) => ({s,i})).filter(x => x.s === max);
            return flowerTypes[top[Math.floor(Math.random()*top.length)].i];
        }

        function displayFlower(f) {
            document.getElementById('flower-icon').textContent = f.icon;
            document.getElementById('flower-name').textContent = f.name;
            document.getElementById('flower-title').textContent = f.title;
            document.getElementById('flower-description').textContent = f.description;
            document.getElementById('trait-tags').innerHTML = f.traits.map(t => `<span class="trait-tag">${t}</span>`).join('');
        }

        function restartTest() {
            currentQuestion = 0; answers = [];
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('start-page').classList.remove('hidden');
            document.getElementById('progress-fill').style.width = '0%';
            loadCounter();
        }

        window.onload = loadCounter;
    </script>
