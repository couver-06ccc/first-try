<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 花之性格测试 - Flower Personality Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e8eaf6 50%, #e3f2fd 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* 标题区域 */
        .header {
            text-align: center;
            padding: 40px 20px;
        }

        .header h1 {
            font-size: 2.5rem;
            color: #5d4037;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .header p {
            font-size: 1.1rem;
            color: #6d4c41;
        }

        /* 进度条 */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9800, #e91e63);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* 问题卡片 */
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, #ff9800, #e91e63);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            text-align: center;
            line-height: 36px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* 选项按钮 */
        .options {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            width: 100%;
            padding: 18px 25px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            font-size: 1.1rem;
            color: #555;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
        }

        .option-btn:hover {
            border-color: #ff9800;
            background: #fff8e1;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,152,0,0.2);
        }

        .option-btn.selected {
            border-color: #e91e63;
            background: #fce4ec;
            color: #e91e63;
        }

        /* 结果页面 */
        .result-container {
            text-align: center;
            padding: 40px 20px;
        }

        .flower-icon {
            font-size: 8rem;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .flower-name {
            font-size: 2.5rem;
            color: #5d4037;
            margin-bottom: 15px;
        }

        .flower-title {
            font-size: 1.3rem;
            color: #ff9800;
            margin-bottom: 30px;
        }

        .flower-description {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: left;
            line-height: 1.8;
            color: #555;
            box-shadow: 0 5px 25px rgba(0,0,0,0.08);
        }

        .flower-traits {
            margin-top: 25px;
        }

        .flower-traits h4 {
            color: #e91e63;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .trait-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .trait-tag {
            background: linear-gradient(135deg, #ffc107, #ff9800);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 0.95rem;
        }

        /* 重新测试按钮 */
        .restart-btn {
            margin-top: 35px;
            padding: 15px 50px;
            background: linear-gradient(135deg, #e91e63, #ff9800);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(233,30,99,0.3);
        }

        .restart-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(233,30,99,0.4);
        }

        /* 隐藏元素 */
        .hidden {
            display: none;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 50px;
        }

        .loading p {
            font-size: 1.2rem;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff9800;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 开始页面 -->
        <div id="start-page" class="header">
            <h1>🌸 花之性格测试</h1>
            <p>探索你内心深处的花语，发现属于你的花之灵魂</p>
            <button class="restart-btn" style="margin-top: 30px;" onclick="startTest()">开始测试</button>
        </div>

        <!-- 测试页面 -->
        <div id="test-page" class="hidden">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            
            <div class="question-card">
                <span class="question-number" id="question-number">1</span>
                <p class="question-text" id="question-text">问题加载中...</p>
                <div class="options" id="options"></div>
            </div>
        </div>

        <!-- 加载动画 -->
        <div id="loading" class="hidden">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在分析你的花之灵魂...</p>
            </div>
        </div>

        <!-- 结果页面 -->
        <div id="result-page" class="hidden result-container">
            <div class="flower-icon" id="flower-icon">🌸</div>
            <h2 class="flower-name" id="flower-name">结果加载中...</h2>
            <p class="flower-title" id="flower-title">---</p>
            <div class="flower-description">
                <p id="flower-description">描述加载中...</p>
                <div class="flower-traits">
                    <h4>你的花语特质：</h4>
                    <div class="trait-tags" id="trait-tags"></div>
                </div>
            </div>
            <button class="restart-btn" onclick="restartTest()">重新测试</button>
        </div>
    </div>

    <script>
        // 测试问题数据
        const questions = [
            {
                question: "周末你更喜欢做什么？",
                options: [
                    { text: "在家安静地看书或听音乐", type: "introvert" },
                    { text: "和朋友们一起聚会逛街", type: "extrovert" },
                    { text: "去公园散步或郊外踏青", type: "nature" },
                    { text: "尝试新的美食或学习新技能", type: "adventure" }
                ]
            },
            {
                question: "你希望给别人留下什么印象？",
                options: [
                    { text: "温柔体贴，善解人意", type: "gentle" },
                    { text: "热情开朗，充满活力", type: "energetic" },
                    { text: "优雅高贵，气质非凡", type: "elegant" },
                    { text: "神秘深邃，与众不同", type: "mysterious" }
                ]
            },
            {
                question: "遇到困难时，你通常会？",
                options: [
                    { text: "独自冷静思考解决", type: "independent" },
                    { text: "寻求朋友家人的帮助", type: "supportive" },
                    { text: "保持乐观，相信一切都会好", type: "optimistic" },
                    { text: "分析问题，制定详细计划", type: "analytical" }
                ]
            },
            {
                question: "你最喜欢的季节是？",
                options: [
                    { text: "春天 - 万物复苏", type: "fresh" },
                    { text: "夏天 - 热情奔放", type: "warm" },
                    { text: "秋天 - 沉静优雅", type: "serene" },
                    { text: "冬天 - 纯洁静谧", type: "pure" }
                ]
            },
            {
                question: "你更看重什么品质？",
                options: [
                    { text: "真诚与善良", type: "sincere" },
                    { text: "勇气与坚持", type: "brave" },
                    { text: "智慧与才华", type: "wise" },
                    { text: "自由与独立", type: "free" }
                ]
            }
        ];

        // 花类型数据
        const flowerTypes = [
            {
                name: "玫瑰",
                icon: "🌹",
                title: "热情恋人",
                description: "你像一朵盛开的玫瑰，热情而浪漫。你热爱生活，敢于表达自己的情感，对爱情充满向往。你的魅力如同玫瑰般迷人，让人无法抗拒。你珍惜身边的人，愿意为爱的人付出一切。",
                traits: ["热情", "浪漫", "勇敢", "忠诚", "魅力"]
            },
            {
                name: "向日葵",
                icon: "🌻",
                title: "阳光使者",
                description: "你像一朵向日葵，永远面向阳光。你性格开朗，积极乐观，总是能给身边的人带来正能量。无论遇到什么困难，你都能保持微笑，相信一切都会好起来。你的存在就是别人的小太阳。",
                traits: ["乐观", "开朗", "积极", "温暖", "正能量"]
            },
            {
                name: "兰花",
                icon: "🌺",
                title: "优雅君子",
                description: "你像一朵兰花，高贵而优雅。你内心丰富，品味高雅，注重精神世界的追求。你不喜欢张扬，却自有一股独特的气质。你待人谦和，做事稳重，是值得信赖的朋友。",
                traits: ["优雅", "高贵", "内敛", "智慧", "高雅"]
            },
            {
                name: "薰衣草",
                icon: "💜",
                title: "宁静之心",
                description: "你像一片薰衣草田，宁静而治愈。你性格温和，善于倾听，是朋友们倾诉的对象。你懂得享受独处的时光，内心平静而强大。你的存在能让周围的人感到安心和放松。",
                traits: ["宁静", "治愈", "温柔", "平和", "包容"]
            },
            {
                name: "樱花",
                icon: "🌸",
                title: "梦幻精灵",
                description: "你像一朵樱花，美丽而短暂。你拥有浪漫的灵魂，喜欢生活中的小美好。你温柔善良，敏感细腻，能感受到别人不易察觉的情感。你的存在让世界变得更加美好。",
                traits: ["浪漫", "温柔", "细腻", "美好", "灵动"]
            },
            {
                name: "郁金香",
                icon: "🌷",
                title: "优雅贵族",
                description: "你像一朵郁金香，典雅而高贵。你注重礼仪，举止得体，有着良好的教养。你追求完美，对自己要求严格，但也懂得享受生活。你是人群中的亮点，自带光芒。",
                traits: ["典雅", "高贵", "精致", "自律", "优雅"]
            },
            {
                name: "梅花",
                icon: "🌼",
                title: "坚韧勇士",
                description: "你像一朵梅花，傲雪凌霜。你意志坚强，不畏艰难，在逆境中依然能绽放美丽。你有自己的原则和信念，不会轻易动摇。你的坚韧和毅力让人敬佩。",
                traits: ["坚韧", "勇敢", "不屈", "高洁", "顽强"]
            },
            {
                name: "荷花",
                icon: "🪷",
                title: "清莲雅士",
                description: "你像一朵荷花，出淤泥而不染。你内心纯净，追求真善美，不随波逐流。你有自己的精神追求，注重内心的修养。你的高洁品格让人敬仰。",
                traits: ["纯洁", "高雅", "正直", "脱俗", "清逸"]
            }
        ];

        let currentQuestion = 0;
        let answers = [];

        // 开始测试
        function startTest() {
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('test-page').classList.remove('hidden');
            showQuestion();
        }

        // 显示问题
        function showQuestion() {
            const question = questions[currentQuestion];
            document.getElementById('question-number').textContent = currentQuestion + 1;
            document.getElementById('question-text').textContent = question.question;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            question.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                button.textContent = option.text;
                button.onclick = () => selectOption(option.type);
                optionsContainer.appendChild(button);
            });
            
            updateProgress();
        }

        // 选择选项
        function selectOption(type) {
            answers.push(type);
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        // 更新进度条
        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-fill').style.width = progress + '%';
        }

        // 显示结果
        function showResult() {
            document.getElementById('test-page').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result-page').classList.remove('hidden');
                
                const flower = calculateResult();
                displayFlower(flower);
            }, 1500);
        }

        // 计算结果
        function calculateResult() {
            const typeMapping = {
                extrovert: [0, 1],
                introvert: [2, 3],
                nature: [4, 7],
                adventure: [5, 0],
                gentle: [3, 4],
                energetic: [1, 0],
                elegant: [2, 5],
                mysterious: [3, 7],
                independent: [6, 2],
                supportive: [0, 1],
                optimistic: [1, 4],
                analytical: [2, 5],
                fresh: [4, 1],
                warm: [0, 1],
                serene: [3, 7],
                pure: [7, 6],
                sincere: [0, 3],
                brave: [6, 0],
                wise: [2, 5],
                free: [4, 6]
            };
            
            let scores = new Array(flowerTypes.length).fill(0);
            
            answers.forEach(type => {
                if (typeMapping[type]) {
                    typeMapping[type].forEach(index => {
                        scores[index]++;
                    });
                }
            });
            
            const maxScore = Math.max(...scores);
            const topFlowers = scores
                .map((score, index) => ({ score, index }))
                .filter(item => item.score === maxScore);
            
            const randomIndex = Math.floor(Math.random() * topFlowers.length);
            return flowerTypes[topFlowers[randomIndex].index];
        }

        // 显示花类型结果
        function displayFlower(flower) {
            document.getElementById('flower-icon').textContent = flower.icon;
            document.getElementById('flower-name').textContent = flower.name;
            document.getElementById('flower-title').textContent = flower.title;
            document.getElementById('flower-description').textContent = flower.description;
            
            const traitTags = document.getElementById('trait-tags');
            traitTags.innerHTML = '';
            
            flower.traits.forEach(trait => {
                const tag = document.createElement('span');
                tag.className = 'trait-tag';
                tag.textContent = trait;
                traitTags.appendChild(tag);
            });
        }

        // 重新测试
        function restartTest() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('result-page').classList.add('hidden');
            document.getElementById('start-page').classList.remove('hidden');
            document.getElementById('progress-fill').style.width = '0%';
        }
    </script>
</body>
</html>
